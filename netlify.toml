# Netlify deployment configuration for HUNTED BY CLAUDE.
#
# The repo contains both a static React/Three.js client and an Express +
# `ws` websocket server. Netlify's static hosting deploys the built client
# from `dist/public`. The realtime websocket gateway is intentionally not
# bundled into Netlify Functions (Functions don't support long-lived ws
# connections); the client falls back to single-player rendering when no
# websocket gateway is reachable.

[build]
  base = "."
  publish = "dist/public"
  command = "pnpm install --no-frozen-lockfile && pnpm run build:client"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--no-audit --no-fund"
  # pnpm v10 ignores the explicit `--no-frozen-lockfile` install flag when
  # CI=true (which Netlify sets by default), so we have to disable
  # frozen-lockfile via the dedicated env var. Without this, every PR that
  # adds/changes a dep blows up at install time with ERR_PNPM_OUTDATED_LOCKFILE.
  NPM_CONFIG_FROZEN_LOCKFILE = "false"

# SPA fallback so wouter-driven client routes resolve correctly.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Long-cache hashed assets emitted by Vite.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
