<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="HUNTED">
<meta name="theme-color" content="#0a0a0a">
<title>HUNTED – Escape or Die</title>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
/* ── RESET ── */
*{margin:0;padding:0;box-sizing:border-box;touch-action:none;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Courier New',monospace;color:#e0e0e0}
canvas:not(#minimap){position:fixed;inset:0;display:block;width:100%!important;height:100%!important;z-index:1}

/* ── LOBBY ── */
#lobby{position:fixed;inset:0;z-index:500;background:radial-gradient(ellipse at 50% 30%,#1a0505 0%,#0a0000 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;overflow-y:auto;gap:6px}
#lobby.hidden{display:none!important}
#lobby-title{font-size:clamp(3rem,14vw,6rem);font-weight:900;color:#cc1a1a;letter-spacing:.25em;text-shadow:0 0 40px #cc1a1a88,0 0 80px #cc1a1a44;animation:flicker 3s infinite}
@keyframes flicker{0%,100%{opacity:1}92%{opacity:1}93%{opacity:.7}94%{opacity:1}96%{opacity:.85}97%{opacity:1}}
#lobby-sub{color:#666;font-size:.8rem;letter-spacing:.2em;margin-bottom:16px}
#nameInput{background:#111;border:1px solid #333;color:#e0e0e0;padding:13px 18px;font-size:1rem;width:min(300px,88vw);text-align:center;font-family:inherit;border-radius:4px;transition:border-color .2s}
#nameInput:focus{outline:none;border-color:#cc1a1a;box-shadow:0 0 12px #cc1a1a44}
.lbtn{background:transparent;border:1.5px solid #cc1a1a;color:#cc1a1a;padding:13px 20px;font-size:.85rem;cursor:pointer;font-family:inherit;letter-spacing:.12em;width:min(300px,88vw);transition:all .2s;border-radius:4px;font-weight:700}
.lbtn:hover,.lbtn:active{background:#cc1a1a;color:#fff;box-shadow:0 0 20px #cc1a1a66}
.lbtn.sec{border-color:#444;color:#777}
.lbtn.sec:hover,.lbtn.sec:active{background:#444;color:#fff;box-shadow:none}
#lobby-status{color:#555;font-size:.75rem;text-align:center;min-height:18px;margin-top:4px}
#playerList{color:#666;font-size:.75rem;text-align:center;line-height:1.9;margin-top:8px}
#startBtn{display:none;background:#1a4a1a;border-color:#2a8a2a;color:#4aff4a}
#startBtn:hover{background:#2a8a2a;color:#fff}

/* ── HUD ── */
#hud{position:fixed;top:0;left:0;right:0;z-index:100;pointer-events:none;padding:10px 14px;background:linear-gradient(180deg,rgba(0,0,0,.55) 0%,transparent 100%)}
#hud.hidden{display:none}
#timer{text-align:center;font-size:clamp(1.1rem,4vw,1.6rem);color:#cc1a1a;text-shadow:0 0 12px #cc1a1a88;font-weight:bold;letter-spacing:.1em}
#timer.urgent{animation:pulse-red .4s infinite}
@keyframes pulse-red{0%,100%{color:#cc1a1a}50%{color:#ff4444;text-shadow:0 0 20px #ff444488}}
#hud-bottom{position:fixed;bottom:0;left:0;right:0;z-index:100;pointer-events:none;padding:0 12px 8px;display:flex;flex-direction:column;gap:4px}
.bar-row{display:flex;align-items:center;gap:8px;font-size:.65rem;color:#888;letter-spacing:.08em}
.bar{flex:1;height:5px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .2s}
#sanity-fill{background:linear-gradient(90deg,#00cc44,#ffcc00,#cc1a1a);width:100%}
#noise-fill{background:linear-gradient(90deg,#1a88ff,#cc1a1a);width:0%}
#carrying-label{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);z-index:100;font-size:.8rem;color:#ffd700;text-shadow:0 0 8px #ffd70088;background:rgba(0,0,0,.7);padding:6px 14px;border-radius:10px;border:1px solid #ffd70033;pointer-events:none;white-space:nowrap}
#carrying-label.hidden{display:none}
#interact-hint{position:fixed;bottom:130px;left:50%;transform:translateX(-50%);z-index:100;font-size:.8rem;color:#fff;background:rgba(0,0,0,.8);padding:8px 16px;border-radius:14px;border:1px solid rgba(255,255,255,.15);pointer-events:none;opacity:0;transition:opacity .25s;white-space:nowrap}
#interact-hint.show{opacity:1}
#key-status{position:fixed;top:48px;right:12px;z-index:100;font-size:.7rem;color:#aaa;text-align:right;pointer-events:none;line-height:1.6;background:rgba(0,0,0,.45);padding:5px 9px;border-radius:5px}

/* ── CROSSHAIR ── */
#crosshair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:50;pointer-events:none;width:14px;height:14px}
#crosshair::before,#crosshair::after{content:'';position:absolute;background:rgba(255,255,255,.5);border-radius:1px}
#crosshair::before{width:2px;height:14px;left:6px;top:0}
#crosshair::after{width:14px;height:2px;top:6px;left:0}
#crosshair.hidden{display:none}

/* ── MINIMAP ── */
#minimap{position:fixed;top:52px;left:10px;z-index:100;border:1px solid rgba(255,255,255,.12);border-radius:4px;background:rgba(0,0,0,.55);pointer-events:none;width:auto!important;height:auto!important;inset:auto!important;max-width:120px;max-height:100px}
#minimap.hidden{display:none}

/* ── MOBILE CONTROLS ── */
#joystick-zone{position:fixed;bottom:0;left:0;width:44%;height:58%;z-index:40}
#look-zone{position:fixed;bottom:0;right:0;width:56%;height:75%;z-index:40}
#jstick-bg{position:fixed;bottom:16px;left:16px;width:90px;height:90px;border-radius:50%;background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.1);pointer-events:none;z-index:41}
#jstick-knob{position:fixed;bottom:31px;left:31px;width:60px;height:60px;border-radius:50%;background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.25);pointer-events:none;z-index:42;transition:transform .05s}
#action-btns{position:fixed;bottom:14px;right:10px;display:flex;flex-direction:column;gap:8px;z-index:45}
#action-btns.hidden{display:none}
.abtn{width:54px;height:54px;border-radius:50%;border:1.5px solid rgba(255,255,255,.28);background:rgba(255,255,255,.07);color:rgba(255,255,255,.8);font-size:.6rem;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;letter-spacing:.05em;backdrop-filter:blur(4px);transition:all .1s;-webkit-backdrop-filter:blur(4px)}
.abtn:active{background:rgba(255,255,255,.22);border-color:rgba(255,255,255,.6);transform:scale(.9)}
.abtn.lit{border-color:rgba(255,215,0,.6);color:#ffd700;animation:glow-btn 1.5s infinite}
@keyframes glow-btn{0%,100%{box-shadow:0 0 0 0 transparent}50%{box-shadow:0 0 14px 3px rgba(255,215,0,.3)}}
#sprint-btn{position:fixed;bottom:14px;left:calc(44% - 32px);z-index:45;width:52px;height:52px;border-radius:50%;border:1.5px solid rgba(255,200,0,.28);background:rgba(255,200,0,.06);color:rgba(255,200,0,.8);font-size:.55rem;font-weight:700;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
#sprint-btn.active{background:rgba(255,200,0,.28);border-color:rgba(255,200,0,.7);transform:scale(.92)}

/* ── SCREEN FX ── */
#vignette{position:fixed;inset:0;z-index:20;pointer-events:none;background:radial-gradient(ellipse at 50% 50%,transparent 38%,rgba(0,0,0,.75) 100%)}
#damage-flash{position:fixed;inset:0;z-index:60;pointer-events:none;background:rgba(180,0,0,.6);opacity:0;transition:opacity .08s}
#scanlines{position:fixed;inset:0;z-index:21;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.06) 2px,rgba(0,0,0,.06) 4px);opacity:.25}
#fear-overlay{position:fixed;inset:0;z-index:22;pointer-events:none;background:rgba(80,0,0,0);transition:background .5s}

/* ── MESSAGE POPUP ── */
#msg-popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:150;font-size:clamp(1.4rem,5vw,2.8rem);color:#cc1a1a;text-shadow:0 0 40px #cc1a1a88;pointer-events:none;opacity:0;transition:opacity .4s;text-align:center;letter-spacing:.1em}
#msg-popup.show{opacity:1}

/* ── DEATH SCREEN ── */
#death-screen{position:fixed;inset:0;z-index:300;background:rgba(20,0,0,.95);display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 1s}
#death-screen.show{opacity:1;pointer-events:auto}
#death-screen h2{font-size:clamp(2rem,10vw,4rem);color:#cc1a1a;letter-spacing:.5em;margin-bottom:16px;text-shadow:0 0 40px #cc1a1a88}
#death-screen p{color:#777;font-size:.85rem;margin-bottom:28px;text-align:center;max-width:85vw;line-height:1.6}
#death-screen button{background:#cc1a1a;color:#fff;border:none;padding:13px 32px;font-size:.95rem;cursor:pointer;border-radius:5px;font-family:inherit;font-weight:700;letter-spacing:.1em;transition:all .2s}
#death-screen button:active{transform:scale(.95);background:#ff2222}

/* ── WIN SCREEN ── */
#win-screen{position:fixed;inset:0;z-index:300;background:rgba(0,20,0,.95);display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 1s}
#win-screen.show{opacity:1;pointer-events:auto}
#win-screen h2{font-size:clamp(2rem,10vw,4rem);color:#00cc44;letter-spacing:.3em;margin-bottom:16px;text-shadow:0 0 40px #00cc4488}
#win-screen p{color:#777;font-size:.85rem;margin-bottom:28px;text-align:center;max-width:85vw;line-height:1.6}
#win-screen button{background:#00cc44;color:#000;border:none;padding:13px 32px;font-size:.95rem;cursor:pointer;border-radius:5px;font-family:inherit;font-weight:700;letter-spacing:.1em}

/* ── RESPONSIVE ── */
@media(max-width:500px){
  #jstick-bg{width:80px;height:80px}
  #jstick-knob{width:52px;height:52px}
  .abtn{width:50px;height:50px}
}
@media(orientation:landscape) and (max-height:500px){
  #lobby{justify-content:flex-start;padding-top:10px}
  #lobby-title{font-size:2.2rem}
  .lbtn{padding:9px 16px}
}
</style>
</head>
<body>

<!-- ═══ LOBBY ═══ -->
<div id="lobby">
  <div id="lobby-title">HUNTED</div>
  <div id="lobby-sub">ESCAPE OR DIE</div>

  <input id="nameInput" type="text" placeholder="Enter your name…" maxlength="20" autocomplete="off">

  <button class="lbtn" onclick="joinGame('solo')">▶ SOLO ESCAPE</button>
  <button class="lbtn" onclick="joinGame('coop')">👥 CO-OP ESCAPE</button>
  <button class="lbtn sec" onclick="joinGame('asymmetric',false)">JOIN AS SURVIVOR</button>
  <button class="lbtn sec" onclick="joinGame('asymmetric',true)">CONTROL THE MONSTER</button>
  <button class="lbtn" id="startBtn" onclick="startGame()">▶ START GAME</button>

  <div id="lobby-status">Connecting…</div>
  <div id="playerList"></div>
</div>

<!-- ═══ HUD ═══ -->
<div id="hud" class="hidden">
  <div id="timer">3:00</div>
</div>
<div id="key-status"></div>
<div id="hud-bottom" class="hidden">
  <div class="bar-row"><span>SANITY</span><div class="bar"><div class="bar-fill" id="sanity-fill"></div></div></div>
  <div class="bar-row"><span>NOISE</span><div class="bar"><div class="bar-fill" id="noise-fill"></div></div></div>
</div>
<div id="carrying-label" class="hidden"></div>
<div id="interact-hint"></div>

<!-- ═══ CROSSHAIR ═══ -->
<div id="crosshair" class="hidden"></div>

<!-- ═══ MINIMAP ═══ -->
<canvas id="minimap" class="hidden" width="100" height="76"></canvas>

<!-- ═══ MOBILE CONTROLS ═══ -->
<div id="joystick-zone"></div>
<div id="look-zone"></div>
<div id="jstick-bg"></div>
<div id="jstick-knob"></div>
<div id="action-btns" class="hidden">
  <button class="abtn" id="interact-btn">USE<br>E</button>
  <button class="abtn" id="crouch-btn">HIDE<br>C</button>
</div>
<div id="sprint-btn" class="hidden">RUN</div>

<!-- ═══ SCREEN FX ═══ -->
<div id="vignette"></div>
<div id="damage-flash"></div>
<div id="scanlines"></div>
<div id="fear-overlay"></div>

<!-- ═══ POPUPS ═══ -->
<div id="msg-popup"></div>
<div id="death-screen">
  <h2>CAUGHT</h2>
  <p id="death-msg">The monster got you…</p>
  <button onclick="location.reload()">TRY AGAIN</button>
</div>
<div id="win-screen">
  <h2>ESCAPED!</h2>
  <p id="win-msg">You made it out alive!</p>
  <button onclick="location.reload()">PLAY AGAIN</button>
</div>

<script>
'use strict';
// ═══════════════════════════════════════════════════════════════
// HUNTED – GRANNY-STYLE HORROR ESCAPE GAME
// Mobile-first · Stealth · Puzzles · Permadeath
// ═══════════════════════════════════════════════════════════════

// ── CONSTANTS ──────────────────────────────────────────────────
const TILE = 4;
const WALL_H = 4;
const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

// ── STATE ──────────────────────────────────────────────────────
let ws = null;
let myId = null;
let mapData = null;
let tileSize = TILE;
let hideSpots = [];
let exitTileInfo = null;

let gamePhase = 'lobby';   // lobby | playing | dead | won
let lastState = null;
let myState = null;
let isHost = false;
let playerCount = 0;

// ── THREE.JS ───────────────────────────────────────────────────
let scene, camera, renderer, clock;
let mapBuilt = false;
let entityMesh = null;
let playerMeshes = {};
let itemMeshes = {};

// ── CAMERA / MOVEMENT ──────────────────────────────────────────
let cameraSnapped = false;
let lookYaw = 0;
let lookPitch = 0;
let bobTimer = 0;
let isMoving = false;
let sprinting = false;
let crouching = false;

// ── INPUT ──────────────────────────────────────────────────────
const keys = {};
let joyX = 0, joyY = 0, joyActive = false;
let lookDX = 0, lookDY = 0, lookActive = false;
let lookTouchId = null;
let joyTouchId = null;
// joystick center in screen coords
let joyCX = 0, joyCY = 0;

// ── AUDIO ──────────────────────────────────────────────────────
let audioCtx = null;
let masterGain = null;
let noiseLevel = 0;
let sanityLevel = 100;
let footstepTimer = 0;

// ── INTERACTION ────────────────────────────────────────────────
let nearbyInteractable = null;

// ═══════════════════════════════════════════════════════════════
// WEBSOCKET
// ═══════════════════════════════════════════════════════════════
function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}`);

  ws.onopen = () => {
    setStatus('Connected – enter your name and choose a mode');
  };

  ws.onmessage = (e) => {
    try { onMsg(JSON.parse(e.data)); } catch (_) {}
  };

  ws.onclose = () => {
    setStatus('Disconnected – reload to reconnect');
    showLobby();
  };

  ws.onerror = () => {
    setStatus('Connection error – check server');
  };
}

function send(msg) {
  if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(msg));
}

// ═══════════════════════════════════════════════════════════════
// MESSAGE HANDLER
// ═══════════════════════════════════════════════════════════════
function onMsg(msg) {
  switch (msg.type) {

    case 'init':
      myId = msg.id;
      mapData = msg.map;
      tileSize = msg.tileSize || TILE;
      hideSpots = msg.hideSpots || [];
      exitTileInfo = msg.exitTile || null;
      setStatus('Ready – choose a game mode');
      // Build 3-D map now that we have data
      if (!mapBuilt) { buildMap(); mapBuilt = true; }
      break;

    case 'playerJoined':
      playerCount++;
      updatePlayerList(msg);
      // Show start button only for host in coop/asymmetric
      if (msg.id === myId) {
        isHost = true;
        if (msg.mode !== 'solo') {
          document.getElementById('startBtn').style.display = 'block';
        }
      }
      setStatus(`${playerCount} player(s) in lobby`);
      break;

    case 'playerLeft':
      playerCount = Math.max(0, playerCount - 1);
      setStatus(`${playerCount} player(s) in lobby`);
      if (playerMeshes[msg.id]) {
        scene.remove(playerMeshes[msg.id]);
        delete playerMeshes[msg.id];
      }
      break;

    case 'gameStart':
      startPlaying();
      break;

    case 'state':
      lastState = msg;
      myState = msg.players ? msg.players[myId] : null;
      if (gamePhase === 'playing') {
        updateScene(msg);
        updateHUD(msg);
      }
      break;

    case 'playerCaught':
      if (msg.id === myId) {
        gamePhase = 'dead';
        document.getElementById('death-msg').textContent =
          'The monster got you… Try to be quieter next time.';
        document.getElementById('death-screen').classList.add('show');
        flashDamage();
      }
      showMsg(msg.id === myId ? 'CAUGHT!' : `${msg.name} was caught!`, 3000);
      break;

    case 'gameEnd':
      if (msg.result === 'escaped') {
        gamePhase = 'won';
        document.getElementById('win-msg').textContent =
          msg.reason === 'time' ? 'You survived the night!' : 'You escaped the house!';
        document.getElementById('win-screen').classList.add('show');
      } else {
        gamePhase = 'dead';
        document.getElementById('death-msg').textContent = 'Nobody escaped…';
        document.getElementById('death-screen').classList.add('show');
      }
      break;

    case 'restart':
      location.reload();
      break;
  }
}

// ═══════════════════════════════════════════════════════════════
// LOBBY HELPERS
// ═══════════════════════════════════════════════════════════════
function setStatus(txt) {
  document.getElementById('lobby-status').textContent = txt;
}

function showLobby() {
  document.getElementById('lobby').classList.remove('hidden');
  gamePhase = 'lobby';
}

function updatePlayerList(msg) {
  // Just show a simple count; full list would need server to send it
  const pl = document.getElementById('playerList');
  pl.textContent = `Player joined: ${msg.name}`;
}

function joinGame(mode, asMonster = false) {
  const name = (document.getElementById('nameInput').value || '').trim()
    || `Ghost_${Math.random().toString(36).slice(2,6).toUpperCase()}`;
  send({ type: 'join', name, mode, asMonster });
  setStatus('Joining…');
}

function startGame() {
  send({ type: 'startGame' });
}

function startPlaying() {
  gamePhase = 'playing';
  cameraSnapped = false;
  document.getElementById('lobby').classList.add('hidden');
  document.getElementById('hud').classList.remove('hidden');
  document.getElementById('hud-bottom').classList.remove('hidden');
  document.getElementById('crosshair').classList.remove('hidden');
  document.getElementById('minimap').classList.remove('hidden');
  document.getElementById('action-btns').classList.remove('hidden');
  document.getElementById('sprint-btn').classList.remove('hidden');
  // Unlock audio
  unlockAudio();
}

// ═══════════════════════════════════════════════════════════════
// THREE.JS SCENE
// ═══════════════════════════════════════════════════════════════
function initScene() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x080808);
  scene.fog = new THREE.FogExp2(0x080808, 0.045);

  camera = new THREE.PerspectiveCamera(72, innerWidth / innerHeight, 0.05, 200);
  camera.position.set(0, -50, 0); // hidden underground until game starts

  renderer = new THREE.WebGLRenderer({ antialias: !isMobile, powerPreference: 'high-performance' });
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio, isMobile ? 1.5 : 2));
  renderer.shadowMap.enabled = !isMobile;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.outputEncoding = THREE.sRGBEncoding;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 0.9;
  document.body.prepend(renderer.domElement);

  clock = new THREE.Clock();

  // Ambient – very dim
  scene.add(new THREE.AmbientLight(0x221111, 0.6));

  // Player flashlight attached to camera
  const fl = new THREE.SpotLight(0xfff5e0, 2.5, 30, Math.PI / 8, 0.6, 1.5);
  fl.position.set(0, 0, 0);
  fl.castShadow = !isMobile;
  if (!isMobile) {
    fl.shadow.mapSize.width = 512;
    fl.shadow.mapSize.height = 512;
  }
  camera.add(fl);
  camera.add(fl.target);
  fl.target.position.set(0, -0.15, -1);
  scene.add(camera);

  window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });
}

// ── MAP GEOMETRY ───────────────────────────────────────────────
function buildMap() {
  if (!mapData || !scene) return;

  const H = mapData.length;
  const W = mapData[0].length;
  const T = tileSize;
  const WH = WALL_H;

  // Shared geometries
  const floorGeo = new THREE.PlaneGeometry(T, T);
  const ceilGeo  = new THREE.PlaneGeometry(T, T);
  const wallGeo  = new THREE.BoxGeometry(T, WH, T);
  const doorGeo  = new THREE.BoxGeometry(T * 0.85, WH * 0.9, 0.25);
  const exitGeo  = new THREE.BoxGeometry(T * 0.85, WH * 0.9, 0.25);
  const hideGeo  = new THREE.BoxGeometry(T * 0.55, WH * 0.75, T * 0.55);

  // Materials
  const floorMat = new THREE.MeshLambertMaterial({ color: 0x1e1510 });
  const ceilMat  = new THREE.MeshLambertMaterial({ color: 0x0f0c0a });
  const wallMat  = new THREE.MeshLambertMaterial({ color: 0x2e2016 });
  const wallMat2 = new THREE.MeshLambertMaterial({ color: 0x241a10 });
  const doorMat  = new THREE.MeshLambertMaterial({ color: 0x4a3520 });
  const exitMat  = new THREE.MeshLambertMaterial({ color: 0x1a4a1a, emissive: 0x051505 });
  const hideMat  = new THREE.MeshLambertMaterial({ color: 0x1a1a28 });

  for (let r = 0; r < H; r++) {
    for (let c = 0; c < W; c++) {
      const t = mapData[r][c];
      const x = c * T + T / 2;
      const z = r * T + T / 2;

      // Floor everywhere except walls
      if (t !== 'W') {
        const f = new THREE.Mesh(floorGeo, floorMat);
        f.rotation.x = -Math.PI / 2;
        f.position.set(x, 0, z);
        f.receiveShadow = !isMobile;
        scene.add(f);
        const ce = new THREE.Mesh(ceilGeo, ceilMat);
        ce.rotation.x = Math.PI / 2;
        ce.position.set(x, WH, z);
        scene.add(ce);
      }

      if (t === 'W') {
        const w = new THREE.Mesh(wallGeo, r % 2 === 0 ? wallMat : wallMat2);
        w.position.set(x, WH / 2, z);
        w.castShadow = !isMobile;
        w.receiveShadow = !isMobile;
        scene.add(w);
      } else if (t === 'D') {
        const d = new THREE.Mesh(doorGeo, doorMat);
        d.position.set(x, WH / 2, z);
        scene.add(d);
      } else if (t === 'X') {
        const ex = new THREE.Mesh(exitGeo, exitMat);
        ex.position.set(x, WH / 2, z);
        scene.add(ex);
        // Glowing exit light
        const pl = new THREE.PointLight(0x00ff44, 1.5, 12);
        pl.position.set(x, 2, z);
        scene.add(pl);
      } else if (t === 'H') {
        const hb = new THREE.Mesh(hideGeo, hideMat);
        hb.position.set(x, WH * 0.375, z);
        scene.add(hb);
      }
    }
  }

  // Spawn item meshes for keys
  // (will be updated in updateScene)
}

// ── ENTITY / PLAYER MESHES ─────────────────────────────────────
function getOrCreateEntity(state) {
  if (!entityMesh) {
    const group = new THREE.Group();
    const bodyGeo = new THREE.BoxGeometry(0.7, 1.6, 0.4);
    const bodyMat = new THREE.MeshLambertMaterial({ color: 0x1a0a0a });
    group.add(new THREE.Mesh(bodyGeo, bodyMat));
    const headGeo = new THREE.BoxGeometry(0.5, 0.5, 0.5);
    const headMat = new THREE.MeshLambertMaterial({ color: 0x2a1515 });
    const head = new THREE.Mesh(headGeo, headMat);
    head.position.y = 1.1;
    group.add(head);
    // Red glowing eyes
    const eyeGeo = new THREE.SphereGeometry(0.07, 6, 6);
    const eyeMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
    const eyeL = new THREE.Mesh(eyeGeo, eyeMat);
    eyeL.position.set(-0.12, 1.12, 0.26);
    const eyeR = new THREE.Mesh(eyeGeo, eyeMat);
    eyeR.position.set(0.12, 1.12, 0.26);
    group.add(eyeL, eyeR);
    // Red point light on entity
    const el = new THREE.PointLight(0xff0000, 0.8, 8);
    el.position.set(0, 1.2, 0);
    group.add(el);
    entityMesh = group;
    scene.add(entityMesh);
  }
  if (state) {
    entityMesh.position.set(state.x, 0.8, state.z);
    entityMesh.rotation.y = state.rotY || 0;
  }
  return entityMesh;
}

function getOrCreatePlayer(id, isMonster) {
  if (!playerMeshes[id]) {
    const group = new THREE.Group();
    const bodyGeo = new THREE.BoxGeometry(0.6, 1.4, 0.35);
    const col = isMonster ? 0x660000 : (id.charCodeAt(0) % 2 === 0 ? 0x1a3a6a : 0x1a5a2a);
    const bodyMat = new THREE.MeshLambertMaterial({ color: col });
    group.add(new THREE.Mesh(bodyGeo, bodyMat));
    const headGeo = new THREE.BoxGeometry(0.45, 0.45, 0.45);
    const head = new THREE.Mesh(headGeo, bodyMat);
    head.position.y = 1.0;
    group.add(head);
    playerMeshes[id] = group;
    scene.add(group);
  }
  return playerMeshes[id];
}

function updateScene(state) {
  // Entity
  if (state.entity) getOrCreateEntity(state.entity);

  // Other players
  if (state.players) {
    for (const [id, p] of Object.entries(state.players)) {
      if (id === myId) continue;
      const mesh = getOrCreatePlayer(id, p.isMonster);
      mesh.position.set(p.x, p.hiding ? 0.3 : 0.7, p.z);
      mesh.visible = p.alive && !p.hiding;
    }
  }

  // Items (keys)
  if (state.items) {
    const colors = { red: 0xff2222, blue: 0x2266ff, green: 0x22ff66 };
    for (const item of state.items) {
      if (!itemMeshes[item.id] && !item.pickedUp) {
        const geo = new THREE.BoxGeometry(0.25, 0.35, 0.08);
        const mat = new THREE.MeshLambertMaterial({
          color: colors[item.color] || 0xffff00,
          emissive: colors[item.color] || 0xffff00,
          emissiveIntensity: 0.4,
        });
        const m = new THREE.Mesh(geo, mat);
        m.position.set(item.x, 0.5, item.z);
        scene.add(m);
        itemMeshes[item.id] = m;
        // Small point light on key
        const kl = new THREE.PointLight(colors[item.color] || 0xffff00, 0.6, 4);
        kl.position.set(item.x, 0.6, item.z);
        scene.add(kl);
      }
      if (itemMeshes[item.id]) {
        itemMeshes[item.id].visible = !item.pickedUp && !item.usedOnExit;
        // Rotate key
        itemMeshes[item.id].rotation.y += 0.02;
      }
    }
  }

  // Proximity check for interaction hints
  checkInteractables(state);
}

function checkInteractables(state) {
  if (!myState || !myState.alive) return;
  const px = myState.x || camera.position.x;
  const pz = myState.z || camera.position.z;
  let hint = '';
  let lit = false;

  if (state.items) {
    for (const item of state.items) {
      if (!item.pickedUp && Math.hypot(item.x - px, item.z - pz) < 2.2) {
        hint = `[E] Pick up ${item.color.toUpperCase()} KEY`;
        lit = true;
        break;
      }
    }
  }

  if (!hint && state.exit && !state.exit.open) {
    const ex = state.exit;
    if (Math.hypot(ex.x - px, ex.z - pz) < 2.5) {
      const keysHeld = state.items ? state.items.filter(i => i.pickedUp && !i.usedOnExit).length : 0;
      hint = keysHeld >= 3 ? '[E] UNLOCK EXIT' : `Need ${3 - keysHeld} more key(s)`;
      lit = keysHeld >= 3;
    }
  }

  const el = document.getElementById('interact-hint');
  if (hint) { el.textContent = hint; el.classList.add('show'); }
  else el.classList.remove('show');

  const ibtn = document.getElementById('interact-btn');
  if (lit) ibtn.classList.add('lit'); else ibtn.classList.remove('lit');
}

// ═══════════════════════════════════════════════════════════════
// HUD
// ═══════════════════════════════════════════════════════════════
function updateHUD(state) {
  // Timer
  const t = Math.max(0, state.time || 0);
  const m = Math.floor(t / 60);
  const s = Math.floor(t % 60);
  const timerEl = document.getElementById('timer');
  timerEl.textContent = `${m}:${s.toString().padStart(2,'0')}`;
  if (t < 30) timerEl.classList.add('urgent'); else timerEl.classList.remove('urgent');

  // Sanity / noise
  document.getElementById('sanity-fill').style.width = sanityLevel + '%';
  document.getElementById('noise-fill').style.width = noiseLevel + '%';

  // Fear overlay (sanity)
  const fear = Math.max(0, (100 - sanityLevel) / 100);
  document.getElementById('fear-overlay').style.background =
    `rgba(80,0,0,${(fear * 0.35).toFixed(2)})`;

  // Carrying label
  if (myState && myState.carrying) {
    const item = state.items ? state.items.find(i => i.id === myState.carrying) : null;
    const cl = document.getElementById('carrying-label');
    cl.textContent = item ? `Carrying: ${item.color.toUpperCase()} KEY` : '';
    cl.classList.toggle('hidden', !item);
  } else {
    document.getElementById('carrying-label').classList.add('hidden');
  }

  // Key status
  if (state.items) {
    const keys = state.items;
    const ks = document.getElementById('key-status');
    ks.innerHTML = keys.map(k => {
      const col = k.color === 'red' ? '#ff4444' : k.color === 'blue' ? '#4488ff' : '#44ff88';
      const icon = k.usedOnExit ? '✓' : k.pickedUp ? '◆' : '◇';
      return `<span style="color:${col}">${icon} ${k.color.toUpperCase()}</span>`;
    }).join('<br>') + `<br><span style="color:#666">EXIT: ${state.exit && state.exit.open ? '🟢' : '🔒'}</span>`;
  }

  // Minimap
  drawMinimap(state);

  // Entity proximity → sanity drain
  if (state.entity && myState) {
    const dist = Math.hypot(state.entity.x - (myState.x || 0), state.entity.z - (myState.z || 0));
    if (dist < 8) {
      sanityLevel = Math.max(0, sanityLevel - (8 - dist) * 0.5);
    } else {
      sanityLevel = Math.min(100, sanityLevel + 3 * (1 / 30));
    }
  }
}

// ── MINIMAP ────────────────────────────────────────────────────
function drawMinimap(state) {
  if (!mapData || !state.players || !state.players[myId]) return;
  const canvas = document.getElementById('minimap');
  const ctx = canvas.getContext('2d');
  const scale = 4;
  const H = mapData.length, W = mapData[0].length;
  canvas.width = W * scale;
  canvas.height = H * scale;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (let r = 0; r < H; r++) {
    for (let c = 0; c < W; c++) {
      const t = mapData[r][c];
      ctx.fillStyle = t === 'W' ? '#2a2a2a' : t === 'D' ? '#4a3520' : t === 'X' ? '#1a4a1a' : t === 'H' ? '#1a1a2a' : '#111';
      ctx.fillRect(c * scale, r * scale, scale, scale);
    }
  }

  // Items
  if (state.items) {
    const cols = { red: '#ff4444', blue: '#4488ff', green: '#44ff88' };
    for (const item of state.items) {
      if (!item.pickedUp && !item.usedOnExit) {
        ctx.fillStyle = cols[item.color] || '#ffff00';
        const ix = (item.x / tileSize) * scale;
        const iz = (item.z / tileSize) * scale;
        ctx.fillRect(ix - 1.5, iz - 1.5, 3, 3);
      }
    }
  }

  // Entity
  if (state.entity && myState && !myState.isMonster) {
    ctx.fillStyle = '#ff0000';
    const ex = (state.entity.x / tileSize) * scale;
    const ez = (state.entity.z / tileSize) * scale;
    ctx.beginPath();
    ctx.arc(ex, ez, 2.5, 0, Math.PI * 2);
    ctx.fill();
  }

  // Other players
  for (const [id, p] of Object.entries(state.players)) {
    if (id === myId || !p.alive || p.isMonster) continue;
    ctx.fillStyle = '#4488ff';
    const px = (p.x / tileSize) * scale;
    const pz = (p.z / tileSize) * scale;
    ctx.fillRect(px - 1.5, pz - 1.5, 3, 3);
  }

  // Self
  const me = state.players[myId];
  if (me) {
    ctx.fillStyle = '#ffffff';
    const mx = (me.x / tileSize) * scale;
    const mz = (me.z / tileSize) * scale;
    ctx.beginPath();
    ctx.arc(mx, mz, 2.5, 0, Math.PI * 2);
    ctx.fill();
  }
}

// ═══════════════════════════════════════════════════════════════
// ANIMATION LOOP
// ═══════════════════════════════════════════════════════════════
function animate() {
  requestAnimationFrame(animate);
  if (!renderer || !scene || !camera) return;

  const dt = Math.min(clock.getDelta(), 0.05);

  if (gamePhase === 'playing' && myState && myState.alive) {
    updateMovement(dt);
  } else if (gamePhase === 'playing' && myState && !myState.alive) {
    // Spectator orbit
    updateSpectator(dt);
  } else if (gamePhase === 'lobby') {
    camera.position.y = -50; // keep hidden
  }

  // Decay noise
  noiseLevel = Math.max(0, noiseLevel - 18 * dt);

  renderer.render(scene, camera);
}

let spectatorAngle = 0;
function updateSpectator(dt) {
  spectatorAngle += dt * 0.25;
  if (lastState && lastState.entity) {
    const tx = lastState.entity.x;
    const tz = lastState.entity.z;
    camera.position.x += (tx + Math.cos(spectatorAngle) * 6 - camera.position.x) * 0.04;
    camera.position.y += (2.5 - camera.position.y) * 0.04;
    camera.position.z += (tz + Math.sin(spectatorAngle) * 6 - camera.position.z) * 0.04;
    camera.rotation.order = 'YXZ';
    camera.rotation.y = Math.atan2(tx - camera.position.x, tz - camera.position.z);
    camera.rotation.x = -0.2;
  }
}

function updateMovement(dt) {
  // ── Joystick / keyboard direction ──
  let moveX = 0, moveZ = 0;

  if (joyActive) {
    moveX = joyX;
    moveZ = joyY;
  } else {
    if (keys['w'] || keys['arrowup'])    moveZ = -1;
    if (keys['s'] || keys['arrowdown'])  moveZ =  1;
    if (keys['a'] || keys['arrowleft'])  moveX = -1;
    if (keys['d'] || keys['arrowright']) moveX =  1;
  }

  isMoving = moveX !== 0 || moveZ !== 0;

  if (isMoving) {
    // Rotate movement by look yaw
    const cos = Math.cos(lookYaw);
    const sin = Math.sin(lookYaw);
    const wx = moveX * cos - moveZ * sin;
    const wz = moveX * sin + moveZ * cos;
    const len = Math.hypot(wx, wz) || 1;
    const speed = crouching ? 2.5 : sprinting ? 7 : 4.5;
    camera.position.x += (wx / len) * speed * dt;
    camera.position.z += (wz / len) * speed * dt;

    // Noise
    const noiseMult = crouching ? 0.2 : sprinting ? 2.5 : 1;
    noiseLevel = Math.min(100, noiseLevel + 20 * noiseMult * dt);

    // Footsteps
    footstepTimer += dt;
    const stepInterval = crouching ? 0.9 : sprinting ? 0.28 : 0.5;
    if (footstepTimer >= stepInterval) {
      footstepTimer = 0;
      playFootstep(crouching ? 0.04 : sprinting ? 0.18 : 0.1);
    }

    // Send movement to server
    const angle = Math.atan2(wz / len, wx / len);
    send({ type: 'move', angle, sprint: sprinting, rotY: lookYaw });
  }

  // Camera bob
  if (isMoving && !crouching) {
    bobTimer += dt * (sprinting ? 14 : 8);
    const bobAmt = sprinting ? 0.065 : 0.03;
    camera.position.y = 1.6 + Math.sin(bobTimer) * bobAmt;
  } else {
    const targetY = crouching ? 0.9 : 1.6;
    camera.position.y += (targetY - camera.position.y) * 0.12;
    if (!isMoving) bobTimer = 0;
  }

  // Snap camera to server position on first tick
  if (!cameraSnapped && lastState && lastState.players && lastState.players[myId]) {
    const me = lastState.players[myId];
    camera.position.x = me.x;
    camera.position.z = me.z;
    cameraSnapped = true;
  }

  // Look (touch)
  if (lookActive) {
    lookYaw   -= lookDX * 0.003;
    lookPitch -= lookDY * 0.003;
    lookDX = 0; lookDY = 0;
  }

  lookPitch = Math.max(-1.2, Math.min(1.2, lookPitch));
  camera.rotation.order = 'YXZ';
  camera.rotation.y = lookYaw;
  camera.rotation.x = lookPitch;
}

// ═══════════════════════════════════════════════════════════════
// AUDIO
// ═══════════════════════════════════════════════════════════════
function unlockAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.12;
  masterGain.connect(audioCtx.destination);
}

function playFootstep(vol = 0.1) {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.08, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / data.length);
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(vol, now);
  g.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
  const filt = audioCtx.createBiquadFilter();
  filt.type = 'lowpass';
  filt.frequency.value = 400;
  src.connect(filt);
  filt.connect(g);
  g.connect(masterGain);
  src.start(now);
}

// ═══════════════════════════════════════════════════════════════
// SCREEN FX
// ═══════════════════════════════════════════════════════════════
function flashDamage() {
  const el = document.getElementById('damage-flash');
  el.style.opacity = '1';
  setTimeout(() => el.style.opacity = '0', 120);
}

function showMsg(txt, dur = 2500) {
  const el = document.getElementById('msg-popup');
  el.textContent = txt;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), dur);
}

// ═══════════════════════════════════════════════════════════════
// TOUCH INPUT
// ═══════════════════════════════════════════════════════════════
const joyZone  = document.getElementById('joystick-zone');
const lookZone = document.getElementById('look-zone');
const knob     = document.getElementById('jstick-knob');
const bg       = document.getElementById('jstick-bg');

// Joystick
joyZone.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.changedTouches[0];
  joyTouchId = t.identifier;
  joyCX = t.clientX;
  joyCY = t.clientY;
  bg.style.left   = (joyCX - 45) + 'px';
  bg.style.bottom = '';
  bg.style.top    = (joyCY - 45) + 'px';
  knob.style.left   = (joyCX - 30) + 'px';
  knob.style.top    = (joyCY - 30) + 'px';
  knob.style.bottom = '';
  joyActive = true;
  unlockAudio();
}, { passive: false });

joyZone.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier !== joyTouchId) continue;
    const dx = t.clientX - joyCX;
    const dy = t.clientY - joyCY;
    const dist = Math.min(Math.hypot(dx, dy), 40);
    const angle = Math.atan2(dy, dx);
    joyX = Math.cos(angle) * dist / 40;
    joyY = Math.sin(angle) * dist / 40;
    knob.style.left = (joyCX + Math.cos(angle) * dist - 30) + 'px';
    knob.style.top  = (joyCY + Math.sin(angle) * dist - 30) + 'px';
  }
}, { passive: false });

joyZone.addEventListener('touchend', e => {
  for (const t of e.changedTouches) {
    if (t.identifier !== joyTouchId) continue;
    joyActive = false;
    joyX = 0; joyY = 0;
    knob.style.left = '31px';
    knob.style.top  = '';
    knob.style.bottom = '31px';
    bg.style.left = '16px';
    bg.style.top  = '';
    bg.style.bottom = '16px';
  }
});

// Look zone
let prevLookX = 0, prevLookY = 0;
lookZone.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.changedTouches[0];
  lookTouchId = t.identifier;
  prevLookX = t.clientX;
  prevLookY = t.clientY;
  lookActive = true;
  unlockAudio();
}, { passive: false });

lookZone.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier !== lookTouchId) continue;
    lookDX += t.clientX - prevLookX;
    lookDY += t.clientY - prevLookY;
    prevLookX = t.clientX;
    prevLookY = t.clientY;
  }
}, { passive: false });

lookZone.addEventListener('touchend', e => {
  for (const t of e.changedTouches) {
    if (t.identifier !== lookTouchId) continue;
    lookActive = false;
  }
});

// ── Mouse look (desktop) ──
let pointerLocked = false;
renderer && document.body.addEventListener('click', () => {
  if (gamePhase === 'playing') document.body.requestPointerLock();
});
document.addEventListener('pointerlockchange', () => {
  pointerLocked = document.pointerLockElement === document.body;
});
document.addEventListener('mousemove', e => {
  if (!pointerLocked || gamePhase !== 'playing') return;
  lookYaw   -= e.movementX * 0.002;
  lookPitch -= e.movementY * 0.002;
});

// ── Keyboard ──
document.addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;
  if (e.key === 'Shift') { sprinting = true; }
  if (e.key === 'c' || e.key === 'C') {
    crouching = !crouching;
    send({ type: 'crouch', active: crouching });
    document.getElementById('crouch-btn').classList.toggle('lit', crouching);
  }
  if (e.key === 'e' || e.key === 'E') {
    send({ type: 'interact' });
    unlockAudio();
  }
});
document.addEventListener('keyup', e => {
  keys[e.key.toLowerCase()] = false;
  if (e.key === 'Shift') sprinting = false;
});

// ── Action buttons ──
document.getElementById('interact-btn').addEventListener('pointerdown', () => {
  send({ type: 'interact' });
  unlockAudio();
});
document.getElementById('crouch-btn').addEventListener('pointerdown', () => {
  crouching = !crouching;
  send({ type: 'crouch', active: crouching });
  document.getElementById('crouch-btn').classList.toggle('lit', crouching);
});
document.getElementById('sprint-btn').addEventListener('pointerdown', () => {
  sprinting = true;
  document.getElementById('sprint-btn').classList.add('active');
});
document.getElementById('sprint-btn').addEventListener('pointerup', () => {
  sprinting = false;
  document.getElementById('sprint-btn').classList.remove('active');
});

// ═══════════════════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════════════════
initScene();
animate();
connect();
</script>
